version: '3.8'

services:
  app:
    build: .
    container_name: bankius_app
    ports:
      - "8081:80"
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pingfin_net
      - internal_ius

  db:
    image: mysql:8.0
    container_name: bankius_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bankdb
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - internal_ius
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: bankius_adminer
    ports:
      - "8091:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_ius

  app_kbc:
    build: .
    container_name: bankkbc_app
    ports:
      - "8082:80"
    env_file:
      - .env.bankkbc.example
    depends_on:
      db_kbc:
        condition: service_healthy
    networks:
      - pingfin_net
      - internal_kbc

  db_kbc:
    image: mysql:8.0
    container_name: bankkbc_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: bankdb
    ports:
      - "3307:3306"
    volumes:
      - ./init-bankkbc.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_kbc_data:/var/lib/mysql
    networks:
      - internal_kbc
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer_kbc:
    image: adminer:latest
    container_name: bankkbc_adminer
    ports:
      - "8092:8080"
    depends_on:
      db_kbc:
        condition: service_healthy
    networks:
      - internal_kbc

networks:
  pingfin_net:
    external: true
  internal_ius:
    driver: bridge
  internal_kbc:
    driver: bridge

volumes:
  mysql_data:
  mysql_kbc_data:
